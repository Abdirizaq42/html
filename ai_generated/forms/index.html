<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soldier & Equipment Registration</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(
        135deg,
        #000000,
        #0f172a,
        #111827,
        #1e293b,
        #000000
    );
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px;
}

.container{
    width:100%;
    max-width:1300px;
}

form{
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:25px;
    padding:35px;
    box-shadow:0 0 35px rgba(0,255,170,0.2);
}

h1{
    text-align:center;
    color:#00ffae;
    margin-bottom:30px;
    letter-spacing:2px;
    text-transform:uppercase;
}

fieldset{
    border:2px solid rgba(0,255,174,0.4);
    border-radius:18px;
    padding:25px;
    margin-bottom:25px;
    background:rgba(255,255,255,0.03);
}

legend{
    color:#00ffae;
    padding:0 15px;
    font-size:18px;
    font-weight:bold;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.form-group{
    margin-bottom:18px;
}

label{
    display:block;
    color:white;
    margin-bottom:8px;
    font-weight:500;
}

input,
select,
textarea{
    width:100%;
    padding:12px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.15);
    background:rgba(255,255,255,0.08);
    color:white;
    outline:none;
    transition:.3s;
}

input:focus,
select:focus,
textarea:focus{
    border-color:#00ffae;
    box-shadow:0 0 12px rgba(0,255,174,.5);
}

textarea{
    resize:vertical;
}

select option{
    background:#111;
}

.checkbox-group,
.radio-group{
    display:flex;
    flex-wrap:wrap;
    gap:20px;
}

.checkbox-group label,
.radio-group label{
    display:flex;
    align-items:center;
    gap:8px;
}

input[type="checkbox"],
input[type="radio"]{
    width:auto;
    accent-color:#00ffae;
}

input[type="range"]{
    accent-color:#00ffae;
}

input[type="color"]{
    height:50px;
    cursor:pointer;
}

.button-group{
    display:flex;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
}

button{
    padding:14px 28px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
    transition:.3s;
}

button:hover{
    transform:translateY(-3px);
}

.submit-btn{
    background:#00ffae;
    color:black;
}

.reset-btn{
    background:#ef4444;
    color:white;
}

.preview-btn{
    background:#3b82f6;
    color:white;
}

meter,
progress{
    width:100%;
    height:20px;
}

@media(max-width:768px){
    form{
        padding:20px;
    }
}
</style>
</head>

<body>

<div class="container">

<form>

<h1>🪖 Soldier & Equipment Registration</h1>

<input type="hidden" name="record_id" value="S001">

<fieldset>
<legend>Personal Information</legend>

<div class="grid">

<div class="form-group">
<label>Full Name</label>
<input type="text" placeholder="Enter full name" required>
</div>

<div class="form-group">
<label>Password</label>
<input type="password" placeholder="Password">
</div>

<div class="form-group">
<label>Email Address</label>
<input type="email" placeholder="name@example.com">
</div>

<div class="form-group">
<label>Phone Number</label>
<input type="tel" placeholder="+254700000000">
</div>

<div class="form-group">
<label>Age</label>
<input type="number" min="18" max="60">
</div>

<div class="form-group">
<label>Search Military ID</label>
<input type="search" placeholder="Search ID">
</div>

</div>
</fieldset>

<fieldset>
<legend>Military Service Details</legend>

<div class="grid">

<div class="form-group">
<label>Date of Birth</label>
<input type="date">
</div>

<div class="form-group">
<label>Enlistment Date & Time</label>
<input type="datetime-local">
</div>

<div class="form-group">
<label>Reporting Time</label>
<input type="time">
</div>

<div class="form-group">
<label>Training Month</label>
<input type="month">
</div>

<div class="form-group">
<label>Training Week</label>
<input type="week">
</div>

<div class="form-group">
<label>Personal Website</label>
<input type="url" placeholder="https://example.com">
</div>

</div>

<div class="form-group">
<label>Rank</label>
<select>
<option>Select Rank</option>
<option>Private</option>
<option>Corporal</option>
<option>Sergeant</option>
<option>Lieutenant</option>
<option>Captain</option>
<option>Major</option>
<option>Colonel</option>
</select>
</div>

<div class="form-group">
<label>Military Branch</label>
<input list="branches" placeholder="Choose branch">
<datalist id="branches">
<option value="Army">
<option value="Air Force">
<option value="Navy">
<option value="Special Forces">
</datalist>
</div>

</fieldset>

<fieldset>
<legend>Equipment Assignment</legend>

<div class="form-group">
<label>Assigned Equipment</label>

<div class="checkbox-group">
<label><input type="checkbox"> Rifle</label>
<label><input type="checkbox"> Pistol</label>
<label><input type="checkbox"> Helmet</label>
<label><input type="checkbox"> Vest</label>
<label><input type="checkbox"> Radio</label>
<label><input type="checkbox"> Night Vision</label>
</div>
</div>

<div class="grid">

<div class="form-group">
<label>Equipment Condition</label>
<input type="range" min="0" max="100">
</div>

<div class="form-group">
<label>Equipment Color</label>
<input type="color">
</div>

<div class="form-group">
<label>Upload Equipment Image</label>
<input type="file">
</div>

</div>

</fieldset>

<fieldset>
<legend>Status & Evaluation</legend>

<div class="form-group">
<label>Deployment Status</label>

<div class="radio-group">
<label><input type="radio" name="status"> Active</label>
<label><input type="radio" name="status"> Reserve</label>
<label><input type="radio" name="status"> On Leave</label>
</div>
</div>

<div class="form-group">
<label>Fitness Score</label>
<meter value="80" min="0" max="100"></meter>
</div>

<div class="form-group">
<label>Mission Completion</label>
<progress value="70" max="100"></progress>
</div>

<div class="form-group">
<label>Mission Notes</label>
<textarea rows="5" placeholder="Enter mission remarks"></textarea>
</div>

</fieldset>

<fieldset>
<legend>Additional Inputs</legend>

<div class="grid">

<div class="form-group">
<label>Favorite Number</label>
<input type="number">
</div>

<div class="form-group">
<label>Date of Next Mission</label>
<input type="date">
</div>

<div class="form-group">
<label>Emergency Contact Email</label>
<input type="email">
</div>

<div class="form-group">
<label>Resettable Text</label>
<input type="text">
</div>

</div>
</fieldset>

<fieldset>
<legend>Form Actions</legend>

<div class="button-group">
<button type="submit" class="submit-btn">Register Soldier</button>
<button type="reset" class="reset-btn">Reset Form</button>
<button type="button" class="preview-btn">Preview</button>
</div>

</fieldset>

</form>

</div>

</body>
</html>
