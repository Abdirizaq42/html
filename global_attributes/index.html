<!DOCTYPE html>
<html
    id="html1"
    class="root"
    lang="en"
    dir="ltr"
    title="HTML Element"
    translate="yes"
    data-type="document">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Attributes Demo</title>
</head>

<body
    id="body1"
    class="page"
    title="Body"
    tabindex="-1"
    accesskey="b"
    contenteditable="false"
    spellcheck="true"
    draggable="false"
    autocapitalize="sentences"
    data-theme="light">

    <header
        id="header1"
        class="header"
        title="Header"
        tabindex="0"
        accesskey="h"
        contenteditable="false"
        spellcheck="true"
        draggable="true"
        translate="yes"
        data-role="banner">

        <h1
            id="title1"
            class="heading"
            title="Main Heading"
            tabindex="0"
            accesskey="t"
            contenteditable="true"
            spellcheck="true"
            draggable="true"
            translate="yes"
            data-level="1">
            HTML Global Attributes
        </h1>

    </header>

    <nav
        id="nav1"
        class="navigation"
        title="Navigation"
        tabindex="0"
        accesskey="n"
        contenteditable="false"
        spellcheck="false"
        draggable="true"
        translate="yes"
        data-nav="main">

        <a
            id="link1"
            class="link"
            href="#"
            title="Home Link"
            tabindex="0"
            accesskey="1"
            contenteditable="false"
            spellcheck="false"
            draggable="true"
            translate="yes"
            data-link="home">
            Home
        </a>

    </nav>

    <main
        id="main1"
        class="content"
        title="Main Content"
        tabindex="0"
        accesskey="m"
        contenteditable="false"
        spellcheck="true"
        draggable="false"
        translate="yes"
        data-main="true">

        <section
            id="section1"
            class="section"
            title="Section"
            tabindex="0"
            accesskey="s"
            contenteditable="false"
            spellcheck="true"
            draggable="true"
            translate="yes"
            data-topic="html">

            <article
                id="article1"
                class="article"
                title="Article"
                tabindex="0"
                accesskey="a"
                contenteditable="false"
                spellcheck="true"
                draggable="true"
                translate="yes"
                data-category="tutorial">

                <p
                    id="p1"
                    class="paragraph"
                    title="Paragraph"
                    tabindex="0"
                    accesskey="p"
                    contenteditable="true"
                    spellcheck="true"
                    draggable="true"
                    translate="yes"
                    data-text="intro">
                    Editable paragraph demonstrating global attributes.
                </p>

                <figure
                    id="figure1"
                    class="figure"
                    title="Figure"
                    tabindex="0"
                    contenteditable="false"
                    spellcheck="false"
                    draggable="true"
                    translate="yes"
                    data-media="image">

                    <img
                        id="img1"
                        class="image"
                        src="https://via.placeholder.com/250"
                        alt="Placeholder"
                        title="Image"
                        tabindex="0"
                        draggable="true"
                        translate="no"
                        data-image="sample">

                    <figcaption
                        id="caption1"
                        class="caption"
                        title="Caption"
                        tabindex="0"
                        contenteditable="true"
                        spellcheck="true"
                        draggable="true"
                        translate="yes"
                        data-caption="figure">
                        Figure Caption
                    </figcaption>

                </figure>

                <blockquote
                    id="quote1"
                    class="quote"
                    title="Quote"
                    tabindex="0"
                    contenteditable="true"
                    spellcheck="true"
                    draggable="true"
                    translate="yes"
                    data-quote="example">
                    Semantic HTML provides meaning to content.
                </blockquote>

                <details
                    id="details1"
                    class="details"
                    title="Details"
                    tabindex="0"
                    contenteditable="false"
                    spellcheck="false"
                    draggable="true"
                    translate="yes"
                    data-expandable="true">

                    <summary
                        id="summary1"
                        class="summary"
                        title="Summary"
                        tabindex="0"
                        data-summary="info">
                        More Info
                    </summary>

                    <p
                        id="detailsp1"
                        class="details-text"
                        title="Details Paragraph"
                        tabindex="0"
                        contenteditable="true"
                        spellcheck="true"
                        draggable="true"
                        translate="yes"
                        data-details="text">
                        Hidden information appears here.
                    </p>

                </details>

            </article>

        </section>

        <aside
            id="aside1"
            class="sidebar"
            title="Sidebar"
            tabindex="0"
            accesskey="d"
            contenteditable="true"
            spellcheck="true"
            draggable="true"
            translate="yes"
            data-sidebar="related">

            Related content goes here.

        </aside>

    </main>

    <footer
        id="footer1"
        class="footer"
        title="Footer"
        tabindex="0"
        accesskey="f"
        contenteditable="false"
        spellcheck="false"
        draggable="true"
        translate="yes"
        data-section="footer">

        <address
            id="address1"
            class="address"
            title="Address"
            tabindex="0"
            contenteditable="true"
            spellcheck="true"
            draggable="true"
            translate="no"
            data-contact="email">

            hello@example.com

        </address>

    </footer>

</body>
</html>
