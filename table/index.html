<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Let's Learn Tables</title>
  </head>
  <body>
    <h1>Work Experience</h1>
    <table border="1">
      <thead>
        <tr>
          <th>Company</th>
          <th>Responsibility</th>
          <th>location</th>
          <th>Year</th>
        </tr>
      </thead>

      <tbody>
        <tr>
          <td>Microsoft</td>
          <td>Software engineer</td>
          <td>New York</td>
          <td>2016-2018</td>
        </tr>
        <tr></tr>
        <tr>
          <td>Samsung</td>
          <td>Software engineer</td>
          <td>Beijing</td>
          <td>2019-2022</td>
        </tr>
        <tr></tr>
        <tr>
          <td>Google</td>
          <td>Software engineer</td>
          <td>New York</td>
          <td>2022-2024</td>
        </tr>
      </tbody>
      <tfoot>
        <tr>
          <th>Company</th>
          <th>Responsibility</th>
          <th>location</th>
          <th>Year</th>
        </tr>
      </tfoot>
    </table>
  </body>
</html>
